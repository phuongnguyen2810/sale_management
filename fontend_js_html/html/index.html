<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng Online mini</title>
    <style>
        /* CSS cơ bản cho đẹp mắt */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .product-grid { 
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; 
        }
        .product-card { 
            background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            padding: 15px; width: 220px; text-align: center; 
        }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .product-card h3 { font-size: 18px; margin: 10px 0; color: #0056b3; }
        .price { color: #e44d26; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        button { 
            background: #28a745; color: white; border: none; padding: 10px 15px; 
            border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;
        }
        button:hover { background: #218838; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #7e6969;
            color: white;
            padding: 10px 30px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .user-info b { color: #ffc107; }
        .logout-btn {
            margin-left: 15px;
            background: #dc3545;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .cart-icon {
            background: #e44d26;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .cart-icon:hover { background: #ff5722; }
    </style>
</head>
<body>
    <div class="header">
    <div id="userInfo" class="user-info">
        </div>
    <div class="cart-icon" onclick="window.location.href='cart.html'">
        🛒 Giỏ hàng (<span id="cartCount">0</span>)
    </div>
</div>
    <h1>🛍️ Danh sách Sản phẩm</h1>
    
    <div id="productList" class="product-grid">
        <p>Đang tải dữ liệu từ Server...</p>
    </div>

    <script>
        // Hàm gọi API lấy dữ liệu
    async function fetchProducts() {
            try {
                // Gọi tới server Node.js của bạn đang chạy ở cổng 5000
                const response = await fetch('http://localhost:5000/api/products/all');
                const products = await response.json();
                
                const productListDiv = document.getElementById('productList');
                productListDiv.innerHTML = ''; // Xóa chữ "Đang tải..."
                
                // Vòng lặp rải từng sản phẩm ra màn hình
                products.forEach(p => {
                    productListDiv.innerHTML += `
                        <div class="product-card">
                            <img src="${p.image}" alt="${p.name}">
                            <h3>${p.name}</h3>
                            <p class="price">${p.price.toLocaleString('vi-VN')} VNĐ</p>
                            <p>Kho: ${p.stock}</p>
                            <button onclick="addToCart('${p._id}', '${p.name}', ${p.price})">🛒 Thêm vào giỏ</button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Lỗi rồi:", error);
                document.getElementById('productList').innerHTML = '<p style="color:red;">Không thể kết nối đến Server. Bạn đã chạy node server.js chưa?</p>';
            }
        }

        // 1. Hàm hiển thị thông tin người dùng
    function checkLogin() {
        const username = localStorage.getItem('username'); // Bạn nhớ lưu username lúc login nhé
        const userId = localStorage.getItem('userId');
        const userInfoDiv = document.getElementById('userInfo');

        if (userId) {
            userInfoDiv.innerHTML = `Chào, <b>${username}</b> 
                                    <a href="profile.html" class="profile-btn">👤 Tài khoản</a>
                                    <span class="logout-btn" onclick="logout()">Đăng xuất</span>`;} else {
            userInfoDiv.innerHTML = `<a href="login.html" style="color:white; text-decoration:none;">Đăng nhập ngay</a>`;
        }
    }

    // 2. Hàm cập nhật số lượng trên icon giỏ hàng
    function updateCartCount() {
        const userId = localStorage.getItem('userId');
        if (!userId) return;

        const cartKey = `cart_${userId}`;
        const cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        
        // Tính tổng số lượng (quantity) của tất cả món hàng
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cartCount').innerText = totalItems;
    }

    // 3. Hàm Đăng xuất
    function logout() {
        localStorage.removeItem('userId');
        localStorage.removeItem('userRole');
        localStorage.removeItem('username');
        window.location.reload(); // Load lại trang để cập nhật giao diện
    }
        // Hàm click nút Thêm vào giỏ (Tạm thời in ra alert)
        // Hàm lưu sản phẩm vào Giỏ hàng (localStorage)
        function addToCart(productId, name, price) {
        const userId = localStorage.getItem('userId');
            
            if (!userId) {
                alert("Vui lòng đăng nhập để mua hàng!");
                window.location.href = 'login.html';
                return;
            }

            // Tạo tên giỏ hàng riêng biệt: cart_65a1b2...
            const cartKey = `cart_${userId}`; 
            let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
            
            let existingItem = cart.find(item => item.product === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ product: productId, name, price, quantity: 1 });
            }
            
            localStorage.setItem(cartKey, JSON.stringify(cart));
            updateCartCount();
            alert("Đã thêm vào giỏ hàng riêng của bạn!");
        }

        // Chạy hàm ngay khi mở trang web
        checkLogin();
        updateCartCount();  
        fetchProducts();
    </script>

</body>
</html>
