<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng MiniShop</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/index.css">

</head>
<body>

    <nav class="navbar navbar-expand-lg glass-header py-3">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fa-brands fa-space-awesome me-2"></i>MiniShop
            </a>
            
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <i class="fa-solid fa-bars fs-3 text-dark"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="ms-auto d-flex flex-column flex-lg-row align-items-center gap-3 mt-3 mt-lg-0" id="userInfo">
                    </div>

                <button class="btn btn-cart-glass position-relative ms-lg-3 mt-3 mt-lg-0" onclick="window.location.href='cart.html'">
                    <i class="fa-solid fa-bag-shopping me-1"></i> Giỏ hàng
                    <span class="position-absolute translate-middle badge rounded-pill cart-badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-3">
        <div class="text-center mb-5">
            <h2 class="fw-bold" style="font-size: 2.5rem; letter-spacing: -1px;">Sản Phẩm Nổi Bật</h2>
            <p class="text-muted fs-5">Khám phá bộ sưu tập tuyệt vời nhất dành cho bạn</p>
        </div>
        
        <div id="productList" class="row g-4 justify-content-center">
            <div class="col-12 text-center py-5">
                <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/index.js"></script>
</body>
</html>
