<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/cart.css">

</head>
<body>

    <nav class="navbar navbar-expand-lg glass-header py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-brands fa-space-awesome me-2"></i>MiniShop
            </a>
            <a href="index.html" class="btn btn-light rounded-pill border shadow-sm px-4 fw-semibold">
                <i class="fa-solid fa-arrow-left me-2"></i> Tiếp tục mua sắm
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="fw-bold mb-4"><i class="fa-solid fa-cart-shopping me-2"></i>Giỏ Hàng Của Bạn</h2>

        <div class="row g-4">
            <div class="col-lg-7 col-xl-8">
                <div class="premium-card">
                    <div class="table-responsive">
                        <table class="table table-cart table-borderless mb-0">
                            <thead>
                                <tr>
                                    <th>Sản phẩm</th>
                                    <th>Đơn giá</th>
                                    <th class="text-center">Số lượng</th>
                                    <th class="text-end">Thành tiền</th>
                                    <th class="text-center">Xóa</th>
                                </tr>
                            </thead>
                            <tbody id="cartTableBody">
                                </tbody>
                        </table>
                    </div>
                    
                    <div class="mt-4 pt-3 border-top text-end">
                        <button class="btn btn-outline-danger rounded-pill px-4" onclick="clearCart()">
                            <i class="fa-solid fa-trash-can me-2"></i>Xóa sạch giỏ hàng
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-5 col-xl-4">
                <div class="premium-card position-sticky" style="top: 100px;">
                    <h4 class="fw-bold mb-4">Tổng Hợp Đơn Hàng</h4>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                        <span class="text-muted fw-semibold">Tổng cộng:</span>
                        <span class="total-price"><span id="totalAmount">0</span> ₫</span>
                    </div>

                    <h5 class="fw-bold mb-3 fs-6"><i class="fa-solid fa-truck-fast me-2"></i>Thông tin giao hàng</h5>
                    
                    <form id="checkoutForm">
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="receiverName" placeholder="Tên" required>
                                    <label>Tên người nhận</label>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-floating">
                                    <input type="tel" class="form-control" id="phone" placeholder="SĐT" required>
                                    <label>Số điện thoại</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="address" placeholder="Địa chỉ" required>
                            <label>Địa chỉ nhận hàng chính xác</label>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <div class="form-floating">
                                    <input type="date" class="form-control" id="deliveryDate" required>
                                    <label>Ngày giao</label>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-floating">
                                    <input type="time" class="form-control" id="deliveryTime">
                                    <label>Giờ giao</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-4">
                            <textarea class="form-control" id="notes" placeholder="Ghi chú" style="height: 80px"></textarea>
                            <label>Ghi chú cho shipper (Tùy chọn)</label>
                        </div>

                        <button type="submit" class="btn btn-checkout w-100">
                            Xác Nhận Đặt Hàng <i class="fa-solid fa-circle-check ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/cart.js"></script>
</body>
</html>
