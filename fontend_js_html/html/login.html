<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực Tài khoản</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">

</head>
<body>

    <div class="auth-card">
        <a href="index.html" class="btn-back" title="Quay lại Trang chủ"><i class="fa-solid fa-arrow-left"></i></a>
        
        <div class="brand-logo"><i class="fa-brands fa-space-awesome me-2"></i>MiniShop</div>
        <h4 class="text-center fw-bold mb-4" id="formHeader">Đăng Nhập</h4>
        
        <form id="loginForm">
            <div class="position-relative mb-3" id="usernameWrapper" style="display: none;">
                <i class="fa-solid fa-user input-icon"></i>
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" placeholder="Tên đăng nhập">
                    <label for="username">Tên người dùng</label>
                </div>
            </div>
            
            <div class="position-relative mb-3">
                <i class="fa-solid fa-envelope input-icon"></i>
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" placeholder="Email" required>
                    <label for="email">Địa chỉ Email</label>
                </div>
            </div>
            
            <div class="position-relative mb-4">
                <i class="fa-solid fa-lock input-icon"></i>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                    <label for="password">Mật khẩu</label>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Đăng Nhập <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i></button>
        </form>

        <div class="toggle-text">
            <span id="toggleTextLabel">Chưa có tài khoản?</span> 
            <span class="toggle-link" onclick="toggleAuth()" id="toggleBtn">Đăng ký ngay</span>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
