<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <style>
        body { font-family: Arial; background: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .toggle-link { margin-top: 15px; font-size: 13px; color: #007bff; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 id="formHeader">Đăng Nhập</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Tên đăng nhập" style="display: none;">
            
            <input type="email" id="email" placeholder="Email của bạn" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <button type="submit" id="submitBtn">Đăng Nhập</button>
        </form>
        <div class="toggle-link" id="toggleBtn" onclick="toggleAuth()">Chưa có tài khoản? Đăng ký ngay</div>
    </div>

    <script>
        let isLogin = true; // Biến để kiểm tra trạng thái

        // Hàm để đổi giao diện
        function toggleAuth() {
            isLogin = !isLogin;
            const header = document.getElementById('formHeader');
            const btn = document.getElementById('submitBtn');
            const toggle = document.getElementById('toggleBtn');
            const userInp = document.getElementById('username');

            if (isLogin) {
                header.innerText = "Đăng Nhập";
                btn.innerText = "Đăng Nhập";
                btn.style.background = "#007bff";
                toggle.innerText = "Chưa có tài khoản? Đăng ký ngay";
                userInp.style.display = "none";
                userInp.required = false;
            } else {
                header.innerText = "Đăng Ký";
                btn.innerText = "Tạo Tài Khoản";
                btn.style.background = "#28a745";
                toggle.innerText = "Đã có tài khoản? Đăng nhập";
                userInp.style.display = "block";
                userInp.required = true;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;
            // Tự động đổi Link API dựa theo chế độ isLogin
            const path = isLogin ? 'login' : 'register'; 
            const url = `http://localhost:5000/api/users/${path}`;

            // Tạo cục dữ liệu để gửi đi
            const bodyData = isLogin 
                ? { email, password } 
                : { username, email, password, role: 'customer' };
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                const data = await res.json();

                if (res.ok) {
                    if (isLogin) {
                        alert(`Chào mừng ${data.user.username}!`);
                        localStorage.setItem('userId', data.user.id);
                        localStorage.setItem('userRole', data.user.role);
                        localStorage.setItem('username', data.user.username);
                        window.location.href = 'index.html'; 
                    } else {
                        alert("Đăng ký thành công! Mời bạn đăng nhập.");
                        toggleAuth(); // Đăng ký xong tự nhảy về màn hình Đăng nhập
                    }
                } else {
                    alert(data.message);
                }
            } catch (err) { alert("Lỗi kết nối Server"); }
        });
    </script>
</body>
</html>
